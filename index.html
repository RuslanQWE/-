<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>MyCloudApp</title>
  <style>
    /* стили для постов и DM */
    .container { max-width: 500px; margin: 20px auto; }
    .dm-user-list { max-height: 220px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
    .dm-user-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #f1f1f1; }
    .dm-chat-box { height: 320px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; padding: 12px; background: #fafafa; }
    .dm-message.me { background: #007bff; color: white; margin-left: auto; border-radius: 14px; padding: 10px; }
    .dm-message.other { background: #ececec; margin-right: auto; border-radius: 14px; padding: 10px; }
  </style>
</head>
<body>

<!-- Авторизация -->
<div id="authBlock" class="container">
  <button id="loginBtn">Войти через Google</button>
</div>
<div id="userInfo" style="display:none;">
  <img id="userPhoto" width="40">
  <span id="userName"></span>
  <button id="logoutBtn">Выйти</button>
</div>

<!-- Посты -->
<div id="messageForm" class="container" style="display:none;">
  <h3>Создать запись</h3>
  <input id="name" readonly>
  <input id="email" readonly>
  <input id="content" placeholder="Что у вас нового?">
  <input type="file" id="imageUpload" accept="image/*">
  <button id="mainBtn">Опубликовать</button>
</div>
<div id="feed" class="container"></div>

<!-- Личные сообщения -->
<div id="dmBlock" class="container" style="display:none;">
  <h3>Личные сообщения</h3>
  <div id="dmUsers" class="dm-user-list"></div>
  <div id="dmChatSection" style="display:none;">
    <div id="dmChatHeader"></div>
    <div id="dmMessages" class="dm-chat-box"></div>
    <input id="dmText" placeholder="Ваше сообщение...">
    <button id="dmSendBtn">Отправить</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "...",
    authDomain: "...",
    projectId: "...",
    storageBucket: "mycloudapp-60f78.appspot.com", // исправлено
    messagingSenderId: "...",
    appId: "...",
    measurementId: "..."
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const storage = getStorage(app);
  const provider = new GoogleAuthProvider();

  // Авторизация
  loginBtn.onclick = () => signInWithPopup(auth, provider);
  logoutBtn.onclick = () => signOut(auth);

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      authBlock.style.display = "none";
      userInfo.style.display = "flex";
      messageForm.style.display = "block";
      dmBlock.style.display = "block";
      userName.innerText = user.displayName;
      userPhoto.src = user.photoURL;
      name.value = user.displayName;
      email.value = user.email;

      // сохраняем пользователя
      await setDoc(doc(db, "users", user.uid), {
        uid: user.uid, displayName: user.displayName, email: user.email, photoURL: user.photoURL, createdAt: serverTimestamp()
      }, { merge: true });

      subscribeToDMUsers();
    }
  });

  // Публикация поста
  mainBtn.onclick = async () => {
    const content = content.value;
    const file = imageUpload.files[0];
    let imageUrl = "";
    if (file) {
      const storageRef = ref(storage, "uploads/" + file.name);
      await uploadBytes(storageRef, file);
      imageUrl = await getDownloadURL(storageRef);
    }
    await addDoc(collection(db, "requests"), {
      name: auth.currentUser.displayName, email: auth.currentUser.email, photo: auth.currentUser.photoURL,
      text: content, image: imageUrl, likes: 0, timestamp: serverTimestamp()
    });
  };

  // Лента постов
  onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snapshot) => {
    feed.innerHTML = "";
    snapshot.forEach(docSnap => {
      const d = docSnap.data();
      feed.innerHTML += `<div class="post"><b>${d.name}</b><p>${d.text}</p>${d.image ? `<img src="${d.image}" width="100%">` : ""}</div>`;
    });
  });

  // DM: список пользователей
  function subscribeToDMUsers() {
    onSnapshot(query(collection(db, "users"), orderBy("displayName")), (snapshot) => {
      dmUsers.innerHTML = "";
      snapshot.forEach(docSnap => {
        const u = docSnap.data();
        if (u.uid !== auth.currentUser.uid) {
          const item = document.createElement("div");
          item.className = "dm-user-item";
          item.innerText = u.displayName;
          item.onclick = () => openDMChat(u);
          dmUsers.appendChild(item);
        }
      });
    });
  }

  // DM: чат
  async function openDMChat(otherUser) {
    dmChatSection.style.display = "block";
    dmChatHeader.innerText = otherUser.displayName;
    const chatId = [auth.currentUser.uid, otherUser.uid].sort().join("_");
    onSnapshot(query(collection(db, "chats", chatId, "messages"), orderBy("createdAt")), (snapshot) => {
      dmMessages.innerHTML = "";
      snapshot.forEach(docSnap => {
        const m = docSnap.data();
        const cls = m.senderId === auth.currentUser.uid ? "me" : "other";
        dmMessages.innerHTML += `<div class="dm-message ${cls}">${m.text}</div>`;
      });
    });
    dmSendBtn.onclick = async () => {
      await addDoc(collection(db, "chats", chatId, "messages"), {
        text: dmText.value, senderId: auth.currentUser.uid, createdAt: serverTimestamp()
      });
      dmText.value = "";
    };
  }
</script>
</body>
</html>
