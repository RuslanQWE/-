name: My Cloud Project

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: windows-2025-latest
    
    steps:
      - uses: actions/checkout@v4 
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies 
        run: npm install

      - name: Build project 
        run: npm run build

      - name: Deploy to Firebase 
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TOKEN }}'
          projectId: 'my-cloud-project-dfb28'
          channelId: live 
        env:
          FIREBASE_CLI_PREVIEWS_ENABLED: hostingchannels
